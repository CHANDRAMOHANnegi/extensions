<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🛡️ Focus Blocker</h1>
            <p>Stay focused, stay productive</p>
        </div>

        <div class="add-section">
            <input type="text" id="urlInput" placeholder="Enter URL (e.g., facebook.com)">
            <button id="addBtn">Add</button>
        </div>

        <div class="list-section">
            <h3>Blocked Sites (<span id="count">0</span>)</h3>
            <div id="blockedList"></div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>

</html>
